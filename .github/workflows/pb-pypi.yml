# ============================================================
# GitHub Actions Workflow: Build and publish package to PyPI
#
# This workflow builds the source distribution (sdist) and
# wheel for the project and publishes them to PyPI using
# Trusted Publishing.
#
# Trigger:
#   - Runs automatically when a GitHub release is published.
#
# Steps:
#   1. Checkout repository
#   2. Set up Python environment
#   3. Install build dependencies
#   4. Build sdist and wheel
#   5. Upload package to PyPI
# ============================================================

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: publish-pypi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools_scm

      - name: Get tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "Tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check tag format
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "Tag: $TAG"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+((a|b|rc)[0-9]+)?(\.post[0-9]+)?$ ]]; then
            echo "❌ Invalid tag format: $TAG"
            exit 1
          fi

          if [[ "$TAG" == *".dev"* ]]; then
            echo "❌ Refusing to publish dev version"
            exit 1
          fi

      - name: Check version not on PyPI
        run: |
          VERSION=$(python -m setuptools_scm)

          if pip index versions crace | grep "$VERSION"; then
            echo "❌ Version already exists on PyPI"
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Show built files
        run: ls -lh dist

      - name: Check distribution
        run: twine check dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1