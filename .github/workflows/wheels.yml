# ============================================================
# GitHub Actions Workflow: Build and publish package to PyPI
#
# This workflow builds the source distribution (sdist) and
# wheel for the project and publishes them to PyPI using
# Trusted Publishing.
#
# Trigger:
#   - Runs automatically when a GitHub release is published.
#
# Steps:
#   1. Checkout repository
#   2. Set up Python environment
#   3. Install build dependencies
#   4. Build sdist and wheel
#   5. Upload package to PyPI
# ============================================================

name: Wheel builder

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      # - name: Sync README from docs
      #   run: bash docs/_static/sync_files.sh

      - name: Build package
        run: python -m build

      - name: Show built files
        run: ls -lh dist

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true